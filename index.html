<!DOCTYPE html>
<html>
<head>
  <title>Smart Calculator Pro</title>

  <!-- 🔥 ADD THIS LINE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<div class="app-container">

  <!-- Calculator -->
  <div class="calculator">
    <div id="display">0</div>

    <div class="top-buttons">
      <button class="gray" onclick="clearDisplay()">AC</button>
      <button class="gray" onclick="backspace()">⌫</button>
      <button class="gray" onclick="startVoice()">🎤</button>
      <button class="orange" onclick="append('/')">÷</button>
    </div>

    <div class="buttons">
      <button onclick="append('7')">7</button>
      <button onclick="append('8')">8</button>
      <button onclick="append('9')">9</button>
      <button class="orange" onclick="append('*')">×</button>

      <button onclick="append('4')">4</button>
      <button onclick="append('5')">5</button>
      <button onclick="append('6')">6</button>
      <button class="orange" onclick="append('-')">−</button>

      <button onclick="append('1')">1</button>
      <button onclick="append('2')">2</button>
      <button onclick="append('3')">3</button>
      <button class="orange" onclick="append('+')">+</button>

      <button class="zero" onclick="append('0')">0</button>
      <button onclick="append('.')">.</button>
      <button class="orange" onclick="calculate()">=</button>
    </div>

    <div class="extra">
      <button onclick="explain()">🧠 Explain</button>
      <button onclick="drawGraph()">📊 Graph</button>
    </div>
  </div>

  <!-- Graph -->
  <div class="graph-box">
    <h3>Graph</h3>
    <canvas id="chart"></canvas>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
